{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h4 class="fw-bold mb-4">Nova Dívida (Fixa ou Temp)</h4>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small text-muted text-uppercase">O que é?</label>
                    {{ form.title }}
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted text-uppercase">Credor (Para quem deve?)</label>
                    {{ form.creditor }}
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small text-muted text-uppercase">Valor Total</label>
                        {{ form.total_amount }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label small text-muted text-uppercase">Valor já Pago</label>
                        {{ form.paid_amount }}
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label small text-muted text-uppercase">Tipo de Dívida</label>
                        {{ form.debt_type }}
                    </div>
                    <div class="col-md-6 mb-4">
                        <label class="form-label small text-muted text-uppercase">Vencimento</label>
                        {{ form.due_date }}
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-purple px-4">Registrar</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
