{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h4 class="fw-bold mb-4">Adicionar Banco/Conta</h4>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small text-muted text-uppercase">Nome do Banco</label>
                    {{ form.name }}
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted text-uppercase">Saldo Inicial</label>
                    {{ form.balance }}
                </div>
                <div class="mb-4">
                    <label class="form-label small text-muted text-uppercase">Cor de Identificação</label>
                    {{ form.color }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-purple px-4">Cadastrar</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
