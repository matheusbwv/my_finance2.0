{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="mb-4">{% if form.instance.pk %}Editar Gasto{% else %}Novo Gasto{% endif %}</h4>
            <form method="post">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Título</label>
                        {{ form.title }}
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Valor (R$)</label>
                        {{ form.amount }}
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Data</label>
                        {{ form.date }}
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Categoria</label>
                        {{ form.category }}
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-12 mb-4">
                        <label class="form-label">Descrição (Opcional)</label>
                        {{ form.description }}
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary px-4">Salvar Gasto</button>
                    <a href="{% url 'expense-list' %}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
