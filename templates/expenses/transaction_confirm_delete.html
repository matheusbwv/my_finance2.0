{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 border-danger">
            <h4 class="text-danger mb-4">Confirmar Exclusão</h4>
            <p>Você tem certeza que deseja excluir o gasto "<strong>{{ object.title }}</strong>" no valor de <strong>R$ {{ object.amount }}</strong>?</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger px-4">Sim, Excluir</button>
                    <a href="{% url 'expense-list' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
