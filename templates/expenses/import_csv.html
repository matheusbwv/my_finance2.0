{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h4 class="fw-bold mb-4">Importar Extrato Nubank (.csv)</h4>
            
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label small text-muted text-uppercase">1. Selecione a Conta de Destino</label>
                    <select name="account" class="form-select bg-dark text-white border-secondary" required>
                        <option value="">Escolha uma conta...</option>
                        {% for account in accounts %}
                            <option value="{{ account.id }}">{{ account.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="form-text text-muted small">As transações serão vinculadas a esta conta.</div>
                </div>

                <div class="mb-4">
                    <label class="form-label small text-muted text-uppercase">2. Arquivo CSV do Nubank</label>
                    <input type="file" name="file" class="form-control bg-dark text-white border-secondary" accept=".csv" required>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-purple px-4">Processar e Importar</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                </div>
            </form>

            <div class="mt-4 p-3 bg-dark rounded border border-secondary">
                <p class="small text-muted mb-0">
                    <i class="fas fa-info-circle me-2"></i>
                    O sistema irá ignorar automaticamente transações que já foram importadas (com base na data, valor e descrição).
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
